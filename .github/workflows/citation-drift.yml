name: citation-drift
on:
  push:
    paths: ['jurisdictions/**', 'schemas/citation-registry.yaml']
  pull_request:
    paths: ['jurisdictions/**', 'schemas/citation-registry.yaml']
jobs:
  citation-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check citation drift
        run: |
          npm ci
          npm run rule-pack-validate -- --all --report citation-drift.report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: citation-drift-report
          path: citation-drift.report.json
