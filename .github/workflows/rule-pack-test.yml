name: rule-pack-test
on:
  push:
    paths: ['jurisdictions/**', 'tools/rule-pack-test/**']
  pull_request:
    paths: ['jurisdictions/**', 'tools/rule-pack-test/**']
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run rule-pack-test
        run: |
          npm ci
          npm run rule-pack-test -- --all --report rule-pack-test.report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rule-pack-test-report
          path: rule-pack-test.report.json
