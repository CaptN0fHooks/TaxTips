name: build-reproducibility
on: [push, pull_request]
jobs:
  reproducibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build twice and diff
        run: |
          npm ci
          npm run rule-pack-validate -- --all --report /tmp/rule-pack-validate-1.json
          npm run rule-pack-test -- --all --report /tmp/rule-pack-test-1.json
          npm run rule-pack-validate -- --all --report /tmp/rule-pack-validate-2.json
          npm run rule-pack-test -- --all --report /tmp/rule-pack-test-2.json
          cmp /tmp/rule-pack-validate-1.json /tmp/rule-pack-validate-2.json
          cmp /tmp/rule-pack-test-1.json /tmp/rule-pack-test-2.json
