name: rule-pack-validate
on:
  push:
    paths: ['jurisdictions/**', 'schemas/**']
  pull_request:
    paths: ['jurisdictions/**', 'schemas/**']
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run rule-pack-validate
        run: |
          npm ci
          npm run rule-pack-validate -- --all --report rule-pack-validate.report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rule-pack-validate-report
          path: rule-pack-validate.report.json
