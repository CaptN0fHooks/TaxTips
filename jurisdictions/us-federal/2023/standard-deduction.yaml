jurisdiction: us-federal
authority: "IRC §63(c)(f); Rev. Proc. 2022-38"

# All amounts are integer USD.
# Additional deductions (age 65+, blind) are PER CONDITION PER PERSON —
# a single filer who is both 65+ AND blind gets $1,850 x 2 = $3,700 additional.
# senior_bonus_obbba is OMITTED — does not exist pre-2025 (OBBBA P.L. 119-21).

