pack: us-federal/2023
tax_year: 2023
jurisdiction: us-federal
authority: "IRC §1(j); Rev. Proc. 2022-38"

# All currency values are integer USD (cents granularity not required for bracket thresholds).
# Rates are decimal fractions (0.10 = 10%).
# Each bracket ceiling is the top of the taxable income range at that rate.
# The top bracket (37%) has no ceiling — it applies above the 35% ceiling.
# MFS brackets are identical to Single brackets at all rates per Rev. Proc. 2022-38.
# QSS brackets are identical to MFJ brackets at all rates.

