# Earned Income Tax Credit — 2023
# Tips are included in full in earned income for EITC purposes.
# §224 qualified tip deduction (OBBBA) does NOT reduce EITC earned income base.
# §224 is N/A in 2023 — noted here for downstream year comparison only.
# MFS filers are BARRED from EITC per IRC §32(d).
# Valid SSN required for taxpayer, spouse (if MFJ), and all qualifying children.

